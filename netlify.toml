# Netlify configuration for Fish Express
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # No build command needed for static HTML
  command = "echo 'No build required - static HTML site'"
  # Publish the root directory
  publish = "."

# Redirects for clean URLs
[[redirects]]
  from = "/*"
  to = "/fishexpress-website.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/*.{js,css,png,jpg,jpeg,gif,svg,webp,ico,woff,woff2}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
